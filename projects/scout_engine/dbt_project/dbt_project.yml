name: 'scout_engine'
version: '1.0.0'
config-version: 2
profile: portfolio

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Path to the raw Understat Parquet files, relative to dbt_project/.
  raw_data_path: "../data/raw"
  raw_matches_path: "../data/raw_matches"

models:
  scout_engine:
    staging:
      +materialized: view
    marts:
      +materialized: table
